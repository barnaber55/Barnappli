<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnappli Sheets 📊</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      padding: 15px;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
      color: white;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .form-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .form-card h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    .form-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 15px;
    }

    .form-group.full {
      grid-template-columns: 1fr;
    }

    input, textarea {
      padding: 12px;
      border: 2px solid #E0E0E0;
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      transition: border-color 0.3s ease;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
    }

    textarea {
      resize: vertical;
      min-height: 60px;
    }

    .input-wrapper {
      display: flex;
      flex-direction: column;
    }

    .input-wrapper label {
      font-size: 12px;
      font-weight: bold;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 140px;
      padding: 14px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
    }

    .btn-add {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-add:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
    }

    .btn-add:active {
      transform: translateY(0);
    }

    .btn-clear {
      background: #FF6B6B;
      color: white;
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
    }

    .btn-clear:hover {
      background: #FF5252;
      transform: translateY(-2px);
    }

    .btn-download {
      background: #4ECDC4;
      color: white;
      box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
    }

    .btn-download:hover {
      background: #45B7B0;
      transform: translateY(-2px);
    }

    .btn-delete {
      background: #FF6B6B;
      color: white;
      padding: 8px 12px;
      font-size: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-delete:hover {
      background: #FF5252;
    }

    .table-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      margin-bottom: 25px;
      overflow-x: auto;
    }

    .table-card h2 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #333;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    table thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    table th {
      padding: 12px;
      text-align: left;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 12px;
    }

    table td {
      padding: 12px;
      border-bottom: 1px solid #E0E0E0;
    }

    table tbody tr:hover {
      background: #F8F9FF;
    }

    table tbody tr:nth-child(even) {
      background: #F5F7FA;
    }

    .empty-message {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 16px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 24px;
      }

      .form-group {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 14px;
      }

      table th, table td {
        padding: 8px;
      }

      button {
        padding: 12px 16px;
        font-size: 14px;
      }
    }

    @media (max-width: 400px) {
      header h1 {
        font-size: 20px;
      }

      .form-card, .table-card {
        padding: 15px;
      }

      button {
        padding: 10px 12px;
        font-size: 12px;
      }

      table th, table td {
        padding: 6px;
        font-size: 12px;
      }

      .btn-delete {
        padding: 6px 8px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>📊 Barnappli Sheets</h1>
      <p>Votre gestionnaire de données mobile-friendly</p>
    </header>

    <div class="form-card">
      <h2>➕ Ajouter une ligne</h2>
      
      <div class="form-group">
        <div class="input-wrapper">
          <label for="nomInput">Nom</label>
          <input 
            type="text" 
            id="nomInput" 
            placeholder="ex: Produit A"
          >
        </div>
        <div class="input-wrapper">
          <label for="quantiteInput">Quantité</label>
          <input 
            type="number" 
            id="quantiteInput" 
            placeholder="ex: 10"
            min="0"
          >
        </div>
      </div>

      <div class="form-group full">
        <div class="input-wrapper">
          <label for="noteInput">Note</label>
          <textarea 
            id="noteInput" 
            placeholder="ex: Commande spéciale"
          ></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn-add" onclick="ajouterLigne()">➕ Ajouter</button>
        <button class="btn-clear" onclick="confirmerVider()">🗑️ Vider tout</button>
        <button class="btn-download" onclick="telechargerExcel()">⬇️ Excel</button>
      </div>
    </div>

    <div class="table-card">
      <h2>📋 Mes données</h2>
      <div id="tableContainer"></div>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  
  <script>
    const STORAGE_KEY = 'barnappli_sheets_data';

    function chargerDonnees() {
      const donnees = localStorage.getItem(STORAGE_KEY);
      return donnees ? JSON.parse(donnees) : [];
    }

    function sauvegarderDonnees(donnees) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(donnees));
    }

    function echapperHTML(texte) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return String(texte).replace(/[&<>"']/g, m => map[m]);
    }

    function afficherTableau() {
      const donnees = chargerDonnees();
      const tableContainer = document.getElementById('tableContainer');

      if (donnees.length === 0) {
        tableContainer.innerHTML = '<div class="empty-message">Aucune donnée. Ajoutez une ligne pour commencer ! 📝</div>';
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nom</th>
              <th>Quantité</th>
              <th>Note</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
      `;

      donnees.forEach((ligne, index) => {
        html += `
          <tr>
            <td>${index + 1}</td>
            <td>${echapperHTML(ligne.nom)}</td>
            <td>${ligne.quantite}</td>
            <td>${echapperHTML(ligne.note)}</td>
            <td>
              <button class="btn-delete" onclick="supprimerLigne(${index})">Supprimer</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      tableContainer.innerHTML = html;
    }

    function ajouterLigne() {
      const nom = document.getElementById('nomInput').value.trim();
      const quantite = parseInt(document.getElementById('quantiteInput').value) || 0;
      const note = document.getElementById('noteInput').value.trim();

      if (!nom) {
        alert('⚠️ Veuillez entrer un nom');
        return;
      }

      const donnees = chargerDonnees();
      donnees.push({
        nom: nom,
        quantite: quantite,
        note: note
      });

      sauvegarderDonnees(donnees);

      document.getElementById('nomInput').value = '';
      document.getElementById('quantiteInput').value = '';
      document.getElementById('noteInput').value = '';

      afficherTableau();
      console.log('✅ Ligne ajoutée avec succès !');
    }

    function supprimerLigne(index) {
      const donnees = chargerDonnees();

      if (index >= 0 && index < donnees.length) {
        donnees.splice(index, 1);
        sauvegarderDonnees(donnees);
        afficherTableau();
        console.log('🗑️ Ligne supprimée');
      }
    }

    function confirmerVider() {
      if (confirm('⚠️ Êtes-vous sûr ? Cette action est irréversible !')) {
        viderTout();
      }
    }

    function viderTout() {
      localStorage.removeItem(STORAGE_KEY);

      document.getElementById('nomInput').value = '';
      document.getElementById('quantiteInput').value = '';
      document.getElementById('noteInput').value = '';

      afficherTableau();
      console.log('🧹 Tout a été vidé');
    }

    function telechargerExcel() {
      const donnees = chargerDonnees();

      if (donnees.length === 0) {
        alert('⚠️ Le tableau est vide. Ajoutez des données d\'abord !');
        return;
      }

      const headers = ['#', 'Nom', 'Quantité', 'Note'];
      const rows = donnees.map((ligne, index) => [
        index + 1,
        ligne.nom,
        ligne.quantite,
        ligne.note
      ]);

      const data = [headers, ...rows];
      const worksheet = XLSX.utils.aoa_to_sheet(data);

      worksheet['!cols'] = [
        { wch: 5 },
        { wch: 20 },
        { wch: 12 },
        { wch: 30 }
      ];

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Données');
      XLSX.writeFile(workbook, 'barnappli_data.xlsx');

      console.log('📥 Excel téléchargé');
    }

    document.getElementById('nomInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') ajouterLigne();
    });

    document.getElementById('quantiteInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') ajouterLigne();
    });

    document.getElementById('noteInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && e.ctrlKey) ajouterLigne();
    });

    afficherTableau();
  </script>
</body>
</html>
