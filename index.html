<!DOCTYPE html>
<html lang="fr">
  <head>
    <!-- Déclaration du type de document et langue -->
    <meta charset="UTF-8">
    <!-- Important pour mobile : dit au navigateur d'adapter la taille -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Titre qui apparaît dans l'onglet du navigateur -->
    <title>App de barnaber55</title>
    <!-- Lien vers le fichier de style (CSS) -->
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <!-- En-tête du site -->
    <header>
      <h1>Salut, c'est barnaber55 ! 👋</h1>
    </header>

    <!-- Section principale avec la carte -->
    <section class="card">
      <!-- Premier paragraphe de bienvenue -->
      <p>Bienvenue sur ma première page web</p>
      <!-- Deuxième paragraphe expliquant que c'est fait depuis mobile -->
      <p>Faite 100% depuis mon téléphone</p>
      <!-- Bouton qui déclenche une action en JavaScript -->
      <button id="monBouton">Clique-moi</button>
    </section>

    <!-- Lien vers le fichier JavaScript pour les interactions -->
    <script src="script.js"></script>
  </body>
</html>
