<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnappli - Faire un don</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 50%, #2d0055 100%);
      position: relative;
      overflow: hidden;
    }

    /* Fond image ville punk futuriste */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600"><defs><linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:%230f0f2e;stop-opacity:0.9"/><stop offset="50%" style="stop-color:%231a0a3e;stop-opacity:0.9"/><stop offset="100%" style="stop-color:%23330055;stop-opacity:0.9"/></linearGradient><filter id="glow"><feGaussianBlur stdDeviation="3" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1200" height="600" fill="url(%23grad1)"/><g filter="url(%23glow)" opacity="0.7"><rect x="100" y="150" width="80" height="250" fill="%23004d99" opacity="0.6"/><rect x="250" y="100" width="100" height="300" fill="%230066cc" opacity="0.5"/><rect x="450" y="200" width="90" height="200" fill="%2300ccff" opacity="0.4"/><rect x="650" y="80" width="110" height="320" fill="%239900ff" opacity="0.5"/><rect x="850" y="150" width="85" height="250" fill="%2300ccff" opacity="0.6"/><rect x="1050" y="120" width="95" height="280" fill="%239900ff" opacity="0.5"/><circle cx="200" cy="300" r="60" fill="%2300ffcc" opacity="0.3"/><circle cx="800" cy="250" r="80" fill="%23ff00ff" opacity="0.2"/><circle cx="600" cy="400" r="100" fill="%2300ccff" opacity="0.2"/><line x1="0" y1="350" x2="1200" y2="350" stroke="%2300ffff" stroke-width="2" opacity="0.3"/><line x1="0" y1="400" x2="1200" y2="400" stroke="%239900ff" stroke-width="2" opacity="0.2"/></g></svg>');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      color: #00ffff;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff,
        0 0 40px #00ffff;
      animation: glow 2s ease-in-out infinite;
      letter-spacing: 3px;
      font-weight: bold;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 
          0 0 10px #00ffff,
          0 0 20px #0066ff,
          0 0 30px #9900ff,
          0 0 40px #00ffff;
      }
      50% {
        text-shadow: 
          0 0 20px #00ffff,
          0 0 30px #0066ff,
          0 0 40px #9900ff,
          0 0 50px #ff00ff,
          0 0 60px #00ffff;
      }
    }

    p {
      font-size: 18px;
      color: #00ffff;
      margin-bottom: 50px;
      opacity: 0.9;
      text-shadow: 0 0 10px #00ffff;
    }

    .btn-donate {
      padding: 20px 60px;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 3px solid #00ffff;
      background: transparent;
      color: #00ffff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      
      /* Effet néon tube */
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      box-shadow: 
        0 0 10px #00ffff,
        inset 0 0 10px rgba(0, 255, 255, 0.3),
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      border-radius: 5px;
    }

    .btn-donate::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-donate:hover {
      border-color: #ff00ff;
      color: #ff00ff;
      text-shadow: 
        0 0 10px #ff00ff,
        0 0 20px #00ffff,
        0 0 30px #0066ff;
      box-shadow: 
        0 0 20px #ff00ff,
        inset 0 0 20px rgba(255, 0, 255, 0.3),
        0 0 30px #00ffff,
        0 0 40px #0066ff;
      transform: scale(1.05);
    }

    .btn-donate:hover::before {
      left: 100%;
    }

    .btn-donate:active {
      transform: scale(0.98);
    }

    /* Effets de lumière autour du bouton */
    .btn-donate::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.5), transparent);
      border-radius: 50%;
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn-donate:active::after {
      width: 300px;
      height: 300px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
        letter-spacing: 2px;
      }

      p {
        font-size: 16px;
      }

      .btn-donate {
        padding: 16px 40px;
        font-size: 18px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .btn-donate {
        padding: 14px 30px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🚀 BARNAPPLI</h1>
    <p>Soutenir le projet</p>
    
    <button class="btn-donate" onclick="donnerPayPal()">💳 FAIRE UN DON</button>
  </div>

  <script>
    function donnerPayPal() {
      // URL PayPal pour donation
      // Montant = 10€ par défaut (modifiable)
      const montant = 10;
      const paypalURL = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=barnaber55@gmail.com&item_name=Don Barnappli&amount=${montant}&currency_code=EUR&return=${window.location.href}&cancel_return=${window.location.href}`;
      
      window.open(paypalURL, '_blank');
    }
  </script>
</body>
</html>
