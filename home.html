<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnappli - Faire un don</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, #0a0e27 0%, #1a0a3e 30%, #2d0055 60%, #1a0a3e 100%);
      position: relative;
      overflow: hidden;
    }

    /* Éléments de ville neon générés */
    body::before {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      background: 
        /* Bâtiment 1 */
        linear-gradient(90deg, transparent 0%, #00ccff 2%, #00ccff 5%, transparent 7%) 10% 30% / 120px 300px,
        /* Bâtiment 2 */
        linear-gradient(90deg, transparent 0%, #9900ff 1%, #9900ff 4%, transparent 6%) 25% 25% / 100px 350px,
        /* Bâtiment 3 */
        linear-gradient(90deg, transparent 0%, #00ffcc 2%, #00ffcc 5%, transparent 8%) 40% 35% / 140px 280px,
        /* Bâtiment 4 */
        linear-gradient(90deg, transparent 0%, #ff00ff 1%, #ff00ff 3%, transparent 5%) 55% 40% / 110px 260px,
        /* Bâtiment 5 */
        linear-gradient(90deg, transparent 0%, #00ccff 2%, #00ccff 6%, transparent 8%) 70% 32% / 130px 320px,
        /* Bâtiment 6 */
        linear-gradient(90deg, transparent 0%, #9900ff 1%, #9900ff 4%, transparent 6%) 85% 28% / 120px 340px,
        /* Lignes horizontales neon */
        linear-gradient(90deg, transparent 0%, #00ffff 0%, #00ffff 100%, transparent 100%) 0% 50% / 100% 1px,
        linear-gradient(90deg, transparent 0%, #9900ff 0%, #9900ff 100%, transparent 100%) 0% 55% / 100% 1px,
        /* Cercles */
        radial-gradient(circle at 30% 40%, rgba(0, 255, 255, 0.3) 0%, transparent 15%) 0% 0% / 400px 400px,
        radial-gradient(circle at 70% 30%, rgba(255, 0, 255, 0.2) 0%, transparent 15%) 0% 0% / 500px 500px;
      background-repeat: no-repeat;
      z-index: 0;
      filter: blur(1px);
      opacity: 0.8;
      animation: cityPulse 4s ease-in-out infinite;
    }

    @keyframes cityPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.9; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      color: #00ffff;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff,
        0 0 40px #00ffff;
      animation: glow 2s ease-in-out infinite;
      letter-spacing: 3px;
      font-weight: bold;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 
          0 0 10px #00ffff,
          0 0 20px #0066ff,
          0 0 30px #9900ff,
          0 0 40px #00ffff;
      }
      50% {
        text-shadow: 
          0 0 20px #00ffff,
          0 0 30px #0066ff,
          0 0 40px #9900ff,
          0 0 50px #ff00ff,
          0 0 60px #00ffff;
      }
    }

    p {
      font-size: 18px;
      color: #00ffff;
      margin-bottom: 50px;
      opacity: 0.9;
      text-shadow: 0 0 10px #00ffff;
    }

    .btn-donate {
      padding: 20px 60px;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 3px solid #00ffff;
      background: transparent;
      color: #00ffff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      
      /* Effet néon tube */
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      box-shadow: 
        0 0 10px #00ffff,
        inset 0 0 10px rgba(0, 255, 255, 0.3),
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      border-radius: 5px;
    }

    .btn-donate::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-donate:hover {
      border-color: #ff00ff;
      color: #ff00ff;
      text-shadow: 
        0 0 10px #ff00ff,
        0 0 20px #00ffff,
        0 0 30px #0066ff;
      box-shadow: 
        0 0 20px #ff00ff,
        inset 0 0 20px rgba(255, 0, 255, 0.3),
        0 0 30px #00ffff,
        0 0 40px #0066ff;
      transform: scale(1.05);
    }

    .btn-donate:hover::before {
      left: 100%;
    }

    .btn-donate:active {
      transform: scale(0.98);
    }

    /* Effets de lumière autour du bouton */
    .btn-donate::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.5), transparent);
      border-radius: 50%;
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn-donate:active::after {
      width: 300px;
      height: 300px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
        letter-spacing: 2px;
      }

      p {
        font-size: 16px;
      }

      .btn-donate {
        padding: 16px 40px;
        font-size: 18px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .btn-donate {
        padding: 14px 30px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>BARNAPPLI</h1>
    <p>Soutenir le projet</p>
    
    <button class="btn-donate" onclick="donnerPayPal()">💳 FAIRE UN DON</button>
  </div>

  <script>
    function donnerPayPal() {
      // URL PayPal pour donation
      // Montant = 10€ par défaut (modifiable)
      const montant = 10;
      const paypalURL = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=barnaber55@gmail.com&item_name=Don Barnappli&amount=${montant}&currency_code=EUR&return=${window.location.href}&cancel_return=${window.location.href}`;
      
      window.open(paypalURL, '_blank');
    }
  </script>
</body>
</html>
