<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barnappli - Faire un don</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Fond image vraie ville neon cyberpunk */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://images.unsplash.com/photo-1514432324607-2e4f9a08ebc9?w=1200&h=800&fit=crop');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      z-index: 0;
      filter: brightness(0.5) contrast(1.2) saturate(1.3) hue-rotate(15deg);
    }

    /* Overlay sombre bleu/violet */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(10, 14, 39, 0.6) 0%, rgba(26, 10, 62, 0.6) 50%, rgba(51, 0, 85, 0.6) 100%);
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 0.85; }
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 30px;
      color: #00ffff;
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff,
        0 0 40px #00ffff;
      animation: glow 2s ease-in-out infinite;
      letter-spacing: 3px;
      font-weight: bold;
    }

    @keyframes glow {
      0%, 100% {
        text-shadow: 
          0 0 10px #00ffff,
          0 0 20px #0066ff,
          0 0 30px #9900ff,
          0 0 40px #00ffff;
      }
      50% {
        text-shadow: 
          0 0 20px #00ffff,
          0 0 30px #0066ff,
          0 0 40px #9900ff,
          0 0 50px #ff00ff,
          0 0 60px #00ffff;
      }
    }

    p {
      font-size: 18px;
      color: #00ffff;
      margin-bottom: 50px;
      opacity: 0.9;
      text-shadow: 0 0 10px #00ffff;
    }

    .btn-donate {
      padding: 20px 60px;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 2px;
      border: 3px solid #00ffff;
      background: transparent;
      color: #00ffff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      
      /* Effet néon tube */
      text-shadow: 
        0 0 10px #00ffff,
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      box-shadow: 
        0 0 10px #00ffff,
        inset 0 0 10px rgba(0, 255, 255, 0.3),
        0 0 20px #0066ff,
        0 0 30px #9900ff;
      border-radius: 5px;
    }

    .btn-donate::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }

    .btn-donate:hover {
      border-color: #ff00ff;
      color: #ff00ff;
      text-shadow: 
        0 0 10px #ff00ff,
        0 0 20px #00ffff,
        0 0 30px #0066ff;
      box-shadow: 
        0 0 20px #ff00ff,
        inset 0 0 20px rgba(255, 0, 255, 0.3),
        0 0 30px #00ffff,
        0 0 40px #0066ff;
      transform: scale(1.05);
    }

    .btn-donate:hover::before {
      left: 100%;
    }

    .btn-donate:active {
      transform: scale(0.98);
    }

    /* Effets de lumière autour du bouton */
    .btn-donate::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(0, 255, 255, 0.5), transparent);
      border-radius: 50%;
      transition: width 0.6s, height 0.6s;
      pointer-events: none;
    }

    .btn-donate:active::after {
      width: 300px;
      height: 300px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 36px;
        letter-spacing: 2px;
      }

      p {
        font-size: 16px;
      }

      .btn-donate {
        padding: 16px 40px;
        font-size: 18px;
        letter-spacing: 1px;
      }
    }

    @media (max-width: 400px) {
      h1 {
        font-size: 28px;
      }

      p {
        font-size: 14px;
      }

      .btn-donate {
        padding: 14px 30px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>BARNAPPLI</h1>
    <p>Soutenir le projet</p>
    
    <button class="btn-donate" onclick="donnerPayPal()">💳 FAIRE UN DON</button>
  </div>

  <script>
    function donnerPayPal() {
      // URL PayPal pour donation
      // Montant = 10€ par défaut (modifiable)
      const montant = 10;
      const paypalURL = `https://www.paypal.com/cgi-bin/webscr?cmd=_xclick&business=barnaber55@gmail.com&item_name=Don Barnappli&amount=${montant}&currency_code=EUR&return=${window.location.href}&cancel_return=${window.location.href}`;
      
      window.open(paypalURL, '_blank');
    }
  </script>
</body>
</html>
